# .github/workflows/backend-tests.yml

name: Backend - Tests

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      # CHANGED: stronger than only "./mvnw test"
      # clean verify will compile, test, package, and run verify-phase checks
      - name: Run backend verify
        run: ./mvnw clean verify

      # CHANGED: helpful for debugging failed test runs in Actions
      - name: Upload backend test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            backend/target/surefire-reports
            backend/target/failsafe-reports