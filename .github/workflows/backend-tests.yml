# .github/workflows/backend-tests.yml

name: Backend - Tests

on:
  pull_request:
    branches: ["main"]
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: backend   # CHANGED: all commands run inside backend folder

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin      # CHANGED: installs Java properly for Spring Boot
          java-version: "17"         # CHANGED: matches your pom.xml
          cache: maven               # CHANGED: speeds up Maven dependency downloads

      - name: Make Maven wrapper executable
        run: chmod +x mvnw           # CHANGED: needed on Linux runners sometimes

      - name: Run backend tests
        run: ./mvnw test             # CHANGED: actual backend testing command

      - name: Upload backend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          retention-days: 7
          if-no-files-found: ignore
          path: |
            backend/target/surefire-reports/**
            backend/target/site/**
