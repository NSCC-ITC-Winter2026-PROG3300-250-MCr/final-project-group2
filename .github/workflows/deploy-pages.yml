# .github/workflows/deploy-pages.yml

name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # OPTIONAL: keeps deploy from publishing a broken main build
      - name: Run frontend tests
        run: pnpm test --if-present

      - name: Build site
        run: pnpm run build

      # CHANGED: current Pages docs use configure-pages@v5
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      # CHANGED: current Pages docs use upload-pages-artifact@v4
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # CHANGED: separate deploy job that waits for build job
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4