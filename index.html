<main class="store-page-container">
  <header class="store-header">
    <h1>Shop Our Collection</h1>
    <p>Hand-crafted tallow skincare for natural hydration.</p>
  </header>

  <div class="store-layout">
    <aside class="store-sidebar">
      <h3>Filter Products</h3>
      <div class="filter-group">
        <h4>Categories</h4>
        <ul>
          <li>
            <label><input type="checkbox" /> Body Whips</label>
          </li>
          <li>
            <label><input type="checkbox" /> Face Creams</label>
          </li>
          <li>
            <label><input type="checkbox" /> Lip Care</label>
          </li>
        </ul>
      </div>
      <div class="filter-group">
        <h4>Price Range</h4>
        <input type="range" min="0" max="50" />
      </div>
    </aside>

    <section class="product-catalog">
      <div class="product-grid">
        <article class="product-card">
          <div class="image-placeholder">[Image]</div>
          <h2>Tallow Body Whip</h2>
          <p class="price">$20.00</p>
          <button>Add to Cart</button>
        </article>

        <article class="product-card">
          <div class="image-placeholder">[Image]</div>
          <h2>Face Cream</h2>
          <p class="price">$25.00</p>
          <button>Add to Cart</button>
        </article>

        <article class="product-card">
          <div class="image-placeholder">[Image]</div>
          <h2>Lip Balm</h2>
          <p class="price">$5.00</p>
          <button>Add to Cart</button>
        </article>
      </div>
    </section>
  </div>
</main>
